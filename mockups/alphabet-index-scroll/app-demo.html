<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Alphabet Index Scroll App Demo</title>
    <link rel="stylesheet" href="./alphabet-index-scroll.css">
    <link rel="stylesheet" href="./demo.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="app-toolbar">
        <nav aria-label="Demo navigation">
          <a href="./index.html">Mockups</a>
          <a href="./modal-demo.html">Modal</a>
        </nav>
        <div class="app-title">Shared Resource Library</div>
        <button class="demo-button primary" type="button">New List</button>
      </header>

      <section class="app-content">
        <div class="resource-panel" id="resource-panel">
          <header class="resource-panel-header">
            <h2>Team Lists</h2>
            <input class="search-field" type="search" placeholder="Search">
          </header>
          <div class="resource-list" id="resource-list" tabindex="0"></div>
        </div>
      </section>
    </main>

    <script src="./alphabet-index-scroll.global.js"></script>
    <script src="./demo-data.global.js"></script>
    <script>
      const { createAlphabetIndexScroll } = window.AlphabetIndexScroll;
      const { glossaryLikeItems } = window.AlphabetIndexScrollDemoData;

      const scrollContainer = document.querySelector("#resource-list");
      const panel = document.querySelector("#resource-panel");
      const items = [...glossaryLikeItems].sort((left, right) => left.title.localeCompare(right.title));

      for (const item of items) {
        const card = document.createElement("article");
        card.className = "resource-card";
        card.dataset.indexLabel = item.title;
        const title = document.createElement("h3");
        title.textContent = item.title;
        const subtitle = document.createElement("p");
        subtitle.textContent = item.subtitle;
        card.append(title, subtitle);
        scrollContainer.append(card);
      }

      createAlphabetIndexScroll({
        scrollContainer,
        indexHost: panel,
        itemSelector: "[data-index-label]",
        maxItems: 18,
        offset: 14,
      });
    </script>
  </body>
</html>
