<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gnosis TMS Source Language Modal Alphabet Index Mockup</title>
    <link rel="stylesheet" href="../../src-ui/styles/fonts-variable.css">
    <link rel="stylesheet" href="../../src-ui/styles/base.css">
    <link rel="stylesheet" href="../../src-ui/styles/modals.css">
    <link rel="stylesheet" href="../../src-ui/styles/responsive.css">
    <link rel="stylesheet" href="./alphabet-index-scroll.css">
    <link rel="stylesheet" href="./gnosis-modal-alphabet-mockup.css">
  </head>
  <body>
    <div id="app">
      <main class="alphabet-index-mockup__page">
        <div class="alphabet-index-mockup__fake-content">
          <section class="card alphabet-index-mockup__fake-card">
            <div class="card__body">
              <p class="card__eyebrow">Projects</p>
              <h1 class="card__title">Mock project page behind the modal</h1>
            </div>
          </section>
          <section class="card alphabet-index-mockup__fake-card"></section>
        </div>

        <div class="modal-backdrop">
          <section class="card modal-card modal-card--compact modal-card--language-picker alphabet-index-mockup__language-card">
            <div class="card__body modal-card__body language-picker-modal">
              <p class="card__eyebrow">SOURCE LANGUAGE</p>
              <h2 class="modal__title">What is the language of this file?</h2>
              <p class="modal__supporting">Select the language of this file from the list below. This will be the source language.</p>
              <div class="language-picker-modal__list-frame">
                <div class="language-picker-modal__list" role="list" data-project-import-source-language-list></div>
              </div>
              <div class="modal__actions">
                <button class="button button--secondary" data-action="cancel-project-import">Cancel</button>
                <button class="button button--primary is-disabled" data-action="continue-project-import-text" disabled aria-disabled="true" data-offline-blocked="true">Continue</button>
              </div>
            </div>
          </section>
        </div>
      </main>
    </div>

    <script src="./alphabet-index-scroll.global.js"></script>
    <script src="./app-language-options.global.js"></script>
    <script>
      const { createAlphabetIndexScroll } = window.AlphabetIndexScroll;
      const { isoLanguageOptions } = window.GnosisLanguageOptions;
      const list = document.querySelector("[data-project-import-source-language-list]");
      const listFrame = document.querySelector(".language-picker-modal__list-frame");
      const continueButton = document.querySelector("[data-action='continue-project-import-text']");
      const languages = [...isoLanguageOptions].sort((left, right) => left.name.localeCompare(right.name));

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      function renderSourceLanguageOption(language, selectedCode) {
        const isSelected = language.code === selectedCode;
        return `
          <button
            class="language-picker-modal__option${isSelected ? " is-selected" : ""}"
            type="button"
            data-action="select-project-import-source-language:${escapeHtml(language.code)}"
            aria-pressed="${isSelected ? "true" : "false"}"
            data-index-label="${escapeHtml(language.name)}"
          >
            <span>${escapeHtml(language.name)}</span>
            <span class="language-picker-modal__code">${escapeHtml(language.code)}</span>
          </button>
        `;
      }

      function setSelectedCode(selectedCode) {
        list.innerHTML = languages.map((language) => renderSourceLanguageOption(language, selectedCode)).join("");
        const hasSelection = Boolean(selectedCode);
        continueButton.disabled = !hasSelection;
        continueButton.toggleAttribute("aria-disabled", !hasSelection);
        continueButton.toggleAttribute("data-offline-blocked", !hasSelection);
        continueButton.classList.toggle("is-disabled", !hasSelection);
      }

      setSelectedCode("");

      list.addEventListener("click", (event) => {
        const button = event.target.closest("[data-action^='select-project-import-source-language:']");
        if (!button) {
          return;
        }
        setSelectedCode(button.dataset.action.split(":").slice(1).join(":"));
        alphabetIndex.update();
      });

      const alphabetIndex = createAlphabetIndexScroll({
        scrollContainer: list,
        indexHost: listFrame,
        itemSelector: ".language-picker-modal__option",
        getLabel: (element) => element.dataset.indexLabel,
        includeMissing: true,
        offset: 4,
      });
    </script>
  </body>
</html>
