<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gnosis TMS</title>
    <style>
      :root {
        color-scheme: light;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #f3d58a;
      }

      body {
        font-family: "Inter", "Noto Sans", sans-serif;
      }

      #app {
        min-height: 100vh;
      }

      .startup-shell {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        box-sizing: border-box;
      }

      .startup-shell__label {
        margin: 0;
        color: #4b2d16;
        font-size: 1.25rem;
        font-weight: 600;
        letter-spacing: 0.02em;
      }
    </style>
    <link rel="stylesheet" href="./styles.css" />
    <script type="module" src="./main.js" defer></script>
  </head>
  <body>
    <div id="app">
      <main class="startup-shell" aria-live="polite">
        <p class="startup-shell__label">Loading Gnosis TMS</p>
      </main>
    </div>
  </body>
</html>
