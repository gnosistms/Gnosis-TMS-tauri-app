# cargo-about configuration — THIRD-PARTY-NOTICES generation for Rust crates.
#
# `accepted` mirrors the allowlist in `deny.toml` (which is what actually
# gates CI); cargo-about uses it to resolve multi-licensed crates to one of
# the accepted licenses (e.g. r-efi `MIT OR Apache-2.0 OR LGPL-2.1-or-later`
# resolves to MIT). Keep the two lists in sync.
#
# Run via: npm run licenses:notices

# Skip the app's own crate (publish = false). It has no `license` field, so
# cargo-about would otherwise synthesize one by scanning the crate directory —
# which on the Windows runner picks up the bundled Git-for-Windows license files
# (GPL-2.0, curl, …) and fails on the deprecated `GPL-2.0` identifier. The app
# crate is not third-party, so it must not appear in THIRD-PARTY-NOTICES.md.
private = { ignore = true }

accepted = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "ISC",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "Zlib",
    "Unicode-3.0",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "BSL-1.0",
    "Unlicense",
    "MIT-0",
    "0BSD",
    "MPL-2.0",
]

# Crates with known non-standard license metadata that cargo-about ships
# built-in fixups for.
workarounds = [
    "ring",
]
