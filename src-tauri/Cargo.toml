[package]
name = "gnosis-tms"
version = "0.1.0"
description = "Gnosis TMS"
authors = ["you"]
edition = "2021"

[lib]
name = "gnosis_tms_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2.0.1", features = [] }

[dependencies]
tauri = { version = "2.0.6", features = [] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tauri-plugin-opener = "2"

