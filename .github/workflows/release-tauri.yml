name: Release Tauri App
run-name: Release ${{ github.ref_name }}

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
      APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
      APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Validate release version metadata
        shell: bash
        env:
          GITHUB_REF_TYPE: ${{ github.ref_type }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          node <<'NODE'
          const fs = require("fs");

          function fail(message) {
            console.error(message);
            process.exit(1);
          }

          function readJsonVersion(filePath) {
            const data = JSON.parse(fs.readFileSync(filePath, "utf8"));
            const version = typeof data.version === "string" ? data.version.trim() : "";
            if (!version) {
              fail(`Could not read a version from ${filePath}.`);
            }
            return version;
          }

          function readCargoTomlVersion(filePath) {
            const text = fs.readFileSync(filePath, "utf8");
            const packageSectionMatch = text.match(/\[package\][\s\S]*?^\s*version\s*=\s*"([^"]+)"/m);
            const version = packageSectionMatch?.[1]?.trim() ?? "";
            if (!version) {
              fail(`Could not read the package version from ${filePath}.`);
            }
            return version;
          }

          const versionsByFile = {
            "package.json": readJsonVersion("package.json"),
            "src-tauri/tauri.conf.json": readJsonVersion("src-tauri/tauri.conf.json"),
            "src-tauri/Cargo.toml": readCargoTomlVersion("src-tauri/Cargo.toml"),
          };

          const distinctVersions = [...new Set(Object.values(versionsByFile))];
          if (distinctVersions.length !== 1) {
            fail(
              [
                "Release version mismatch detected.",
                ...Object.entries(versionsByFile).map(([filePath, version]) => `- ${filePath}: ${version}`),
              ].join("\n"),
            );
          }

          const version = distinctVersions[0];
          if (process.env.GITHUB_REF_TYPE === "tag") {
            const expectedTag = `v${version}`;
            if (process.env.GITHUB_REF_NAME !== expectedTag) {
              fail(
                `Release tag ${process.env.GITHUB_REF_NAME} does not match manifest version ${version}. Expected ${expectedTag}.`,
              );
            }
          }

          console.log(`Validated release version ${version}.`);
          NODE

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install macOS Rust targets
        if: matrix.platform == 'macos-latest'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Import Apple signing certificate
        if: matrix.platform == 'macos-latest'
        shell: bash
        run: |
          CERT_PATH="$RUNNER_TEMP/apple-certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "$APPLE_CERTIFICATE_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$APPLE_CERTIFICATE_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$APPLE_CERTIFICATE_PASSWORD" "$KEYCHAIN_PATH"
          SIGNING_IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | sed -n 's/.*"\(Developer ID Application:.*\)"/\1/p' | head -n 1)
          if [[ -z "$SIGNING_IDENTITY" ]]; then
            echo "Could not find a Developer ID Application signing identity in the imported keychain." >&2
            exit 1
          fi
          echo "APPLE_SIGNING_IDENTITY=$SIGNING_IDENTITY" >> "$GITHUB_ENV"

      - name: Write App Store Connect API key
        if: matrix.platform == 'macos-latest'
        shell: bash
        run: |
          API_KEY_PATH="$RUNNER_TEMP/AuthKey_$APPLE_API_KEY.p8"
          echo "$APPLE_API_KEY_CONTENT" | base64 --decode > "$API_KEY_PATH"
          echo "APPLE_API_KEY_PATH=$API_KEY_PATH" >> "$GITHUB_ENV"

      - name: Install frontend dependencies
        run: npm install

      - name: Bundle Windows Git runtime
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $gitRoot = "src-tauri/resources/windows/git"
          if (Test-Path $gitRoot) {
            Get-ChildItem -Force $gitRoot | Remove-Item -Recurse -Force
          }
          New-Item -ItemType Directory -Force -Path $gitRoot | Out-Null

          $release = Invoke-RestMethod -Headers @{ "User-Agent" = "gnosis-tms-release" } -Uri "https://api.github.com/repos/git-for-windows/git/releases/latest"
          $asset = $release.assets | Where-Object {
            $_.name -match '^MinGit-.*-64-bit\.zip$' -and $_.name -notmatch 'busybox'
          } | Select-Object -First 1
          if (-not $asset) {
            throw "Could not find the latest MinGit 64-bit release asset."
          }

          $archivePath = Join-Path $env:RUNNER_TEMP $asset.name
          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile $archivePath
          Expand-Archive -Path $archivePath -DestinationPath $gitRoot -Force

      - name: Bundle macOS Git runtime
        if: matrix.platform == 'macos-latest'
        shell: bash
        run: |
          GIT_ROOT="src-tauri/resources/macos"
          STAGING_ROOT="$RUNNER_TEMP/git-runtime"
          ARCHIVE_PATH="$GIT_ROOT/git-runtime.tar.gz"
          SYSTEM_GIT="$(xcrun --find git)"
          GIT_EXEC_PATH="$("$SYSTEM_GIT" --exec-path)"
          GIT_USR_ROOT="$(cd "$GIT_EXEC_PATH/../.." && pwd)"
          GIT_SHARE_PATH="$GIT_USR_ROOT/share/git-core"
          rm -rf "$STAGING_ROOT"
          rm -f "$ARCHIVE_PATH"
          mkdir -p "$STAGING_ROOT/bin" "$STAGING_ROOT/libexec" "$STAGING_ROOT/share" "$GIT_ROOT"
          for executable_name in git git-shell scalar; do
            if [[ -f "$GIT_USR_ROOT/bin/$executable_name" ]]; then
              cp "$GIT_USR_ROOT/bin/$executable_name" "$STAGING_ROOT/bin/"
            fi
          done
          cp -R "$GIT_EXEC_PATH" "$STAGING_ROOT/libexec/"
          cp -R "$GIT_SHARE_PATH" "$STAGING_ROOT/share/"
          find "$STAGING_ROOT/bin" "$STAGING_ROOT/libexec/git-core" -type f -print0 | while IFS= read -r -d '' executable; do
            if file -b "$executable" | grep -q 'Mach-O'; then
              codesign --force --sign "$APPLE_SIGNING_IDENTITY" --keychain "$RUNNER_TEMP/app-signing.keychain-db" --timestamp --options runtime "$executable"
            fi
          done
          COPYFILE_DISABLE=1 tar -C "$STAGING_ROOT" -czf "$ARCHIVE_PATH" .

      - name: Sync generated icon assets
        run: npm run icons:sync

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Gnosis TMS ${{ github.ref_name }}
          releaseBody: See the assets below for this release.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      - name: Package mac DMGs with preserved file icon and replace release assets
        if: matrix.platform == 'macos-latest'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ICON_PATH="src-tauri/icons/mac icon-iOS-Default-1024x1024@1x.png"
          if [[ ! -f "$ICON_PATH" ]]; then
            echo "DMG file icon asset not found: $ICON_PATH" >&2
            exit 1
          fi

          while IFS= read -r dmg_path; do
            echo "Applying custom icon to $dmg_path"
            bash src-tauri/dmg/apply-dmg-file-icon.sh "$dmg_path" "$ICON_PATH"
            codesign --force --sign "$APPLE_SIGNING_IDENTITY" --keychain "$RUNNER_TEMP/app-signing.keychain-db" --timestamp "$dmg_path"
            xcrun notarytool submit "$dmg_path" --wait --issuer "$APPLE_API_ISSUER" --key-id "$APPLE_API_KEY" --key "$APPLE_API_KEY_PATH"
            xcrun stapler staple "$dmg_path"
            zip_path="${dmg_path%.dmg}.zip"
            rm -f "$zip_path"
            ditto -c -k --sequesterRsrc "$dmg_path" "$zip_path"
            gh release delete-asset "$GITHUB_REF_NAME" "$(basename "$dmg_path")" --yes || true
            gh release upload "$GITHUB_REF_NAME" "$zip_path" --clobber
          done < <(find src-tauri/target -path '*bundle/dmg/*.dmg' -type f | sort)
