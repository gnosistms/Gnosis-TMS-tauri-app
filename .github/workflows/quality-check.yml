# Gnosis TMS — Quality Check
#
# Fires on:
#   - Push to main
#   - Pull requests marked Ready for Review (drafts are skipped)
#
# Mirrors scripts/local-ci.sh. All check steps invoke the npm scripts in
# package.json so the commands stay in sync with what runs locally.

name: Quality Check

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:

  # ── Rust: format + lint + test ───────────────────────────────────────

  rust-quality:
    name: Rust Quality
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.pull_request.draft == false
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      # Caches compiled dependency artifacts in src-tauri/target/ (plus the cargo
      # registry), keyed on Cargo.lock + the rustc version, so CI recompiles
      # dependencies only when they actually change. Our own crate is always
      # rebuilt and re-linted. PRs restore the cache populated by the base branch.
      - name: Cache Rust build + registry
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri"

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      # Tauri validates configured sidecar paths even for lint/test builds. Linux
      # is not a release target, so provide a zero-byte placeholder instead of
      # downloading and caching a Typst binary that can never be bundled.
      - name: Prepare Linux sidecar placeholder
        run: |
          mkdir -p src-tauri/binaries
          touch src-tauri/binaries/typst-x86_64-unknown-linux-gnu

      - name: Check formatting
        run: npm run format:rust:check

      - name: Run Clippy
        run: npm run lint:rust:strict

      - name: Run tests
        run: npm run test:rust

  # ── JavaScript: lint + test ──────────────────────────────────────────

  js-quality:
    name: JavaScript Quality
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.pull_request.draft == false
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint:js

      - name: Run tests
        run: npm test

  # ── Licenses: dependency compliance (Rust + npm) ─────────────────────
  #
  # Fails any PR that introduces a dependency outside the permissive
  # allowlist (GPL/AGPL/LGPL-only, unknown, or unlicensed). See
  # src-tauri/deny.toml and the check:licenses:* scripts in package.json.
  # Metadata-only: no compilation, so no Tauri system deps are needed.

  license-compliance:
    name: License Compliance
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.pull_request.draft == false
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check Rust dependency licenses
        run: npm run check:licenses:rust

      - name: Check npm dependency licenses
        run: npm run check:licenses:npm

  # ── Secret scanning (gitleaks) ───────────────────────────────────────
  #
  # The durable secret-scan gate. The local pre-push hook runs gitleaks too,
  # but only when a developer has it installed, so CI is the authoritative
  # gate. Scans only the commits introduced by this push/PR (delta mode), so
  # pre-existing findings are not re-reported on every change.

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.pull_request.draft == false
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: "8.30.1"
        run: |
          set -e
          curl -sSfL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo install /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Scan introduced commits for secrets
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
          BEFORE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          set -e
          ZERO="0000000000000000000000000000000000000000"
          if [ "$EVENT_NAME" = "pull_request" ]; then
            git fetch --no-tags origin "$BASE_REF"
            LOG_OPTS="origin/$BASE_REF..HEAD"
          elif [ -n "$BEFORE_SHA" ] && [ "$BEFORE_SHA" != "$ZERO" ]; then
            LOG_OPTS="$BEFORE_SHA..$HEAD_SHA"
          else
            # New branch / first push: no reliable base, scan the tip commit.
            LOG_OPTS="$HEAD_SHA -1"
          fi
          echo "Scanning commit range: $LOG_OPTS"
          gitleaks git --no-banner --redact --log-opts="$LOG_OPTS" .

  # ── Summary gate (required for branch protection) ────────────────────

  quality-summary:
    name: Quality Check Summary
    runs-on: ubuntu-latest
    needs: [rust-quality, js-quality, license-compliance, secret-scan]
    if: always()

    steps:
      - name: Check all jobs
        env:
          RUST_RESULT: ${{ needs.rust-quality.result }}
          JS_RESULT: ${{ needs.js-quality.result }}
          LICENSE_RESULT: ${{ needs.license-compliance.result }}
          SECRET_RESULT: ${{ needs.secret-scan.result }}
        run: |
          echo "Rust Quality:        $RUST_RESULT"
          echo "JavaScript Quality:  $JS_RESULT"
          echo "License Compliance:  $LICENSE_RESULT"
          echo "Secret Scan:         $SECRET_RESULT"
          status=0
          for r in "$RUST_RESULT" "$JS_RESULT" "$LICENSE_RESULT" "$SECRET_RESULT"; do
            case "$r" in
              success|skipped) ;;
              *) status=1 ;;
            esac
          done
          if [ "$status" -eq 0 ]; then
            echo "✓ All quality checks passed"
          else
            echo "✗ Some quality checks failed"
          fi
          exit "$status"
