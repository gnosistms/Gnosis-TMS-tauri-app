# Gnosis TMS — Quality Check
#
# Fires on:
#   - Push to main
#   - Pull requests marked Ready for Review (drafts are skipped)
#
# Mirrors scripts/local-ci.sh. All check steps invoke the npm scripts in
# package.json so the commands stay in sync with what runs locally.

name: Quality Check

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:

  # ── Rust: format + lint + test ───────────────────────────────────────

  rust-quality:
    name: Rust Quality
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.pull_request.draft == false
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:rust:check

      - name: Run Clippy
        run: npm run lint:rust:strict

      - name: Run tests
        run: npm run test:rust

  # ── JavaScript: lint + test ──────────────────────────────────────────

  js-quality:
    name: JavaScript Quality
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.pull_request.draft == false
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint:js

      - name: Run tests
        run: npm test

  # ── Licenses: dependency compliance (Rust + npm) ─────────────────────
  #
  # Fails any PR that introduces a dependency outside the permissive
  # allowlist (GPL/AGPL/LGPL-only, unknown, or unlicensed). See
  # src-tauri/deny.toml and the check:licenses:* scripts in package.json.
  # Metadata-only: no compilation, so no Tauri system deps are needed.

  license-compliance:
    name: License Compliance
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.pull_request.draft == false
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check Rust dependency licenses
        run: npm run check:licenses:rust

      - name: Check npm dependency licenses
        run: npm run check:licenses:npm

  # ── Summary gate (required for branch protection) ────────────────────

  quality-summary:
    name: Quality Check Summary
    runs-on: ubuntu-latest
    needs: [rust-quality, js-quality, license-compliance]
    if: always()

    steps:
      - name: Check all jobs
        env:
          RUST_RESULT: ${{ needs.rust-quality.result }}
          JS_RESULT: ${{ needs.js-quality.result }}
          LICENSE_RESULT: ${{ needs.license-compliance.result }}
        run: |
          echo "Rust Quality:        $RUST_RESULT"
          echo "JavaScript Quality:  $JS_RESULT"
          echo "License Compliance:  $LICENSE_RESULT"
          status=0
          for r in "$RUST_RESULT" "$JS_RESULT" "$LICENSE_RESULT"; do
            case "$r" in
              success|skipped) ;;
              *) status=1 ;;
            esac
          done
          if [ "$status" -eq 0 ]; then
            echo "✓ All quality checks passed"
          else
            echo "✗ Some quality checks failed"
          fi
          exit "$status"
