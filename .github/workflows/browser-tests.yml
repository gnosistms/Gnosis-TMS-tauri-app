# Gnosis TMS — Browser Tests
#
# Runs the Playwright editor suite (tests/browser) against the Vite dev
# server on Linux and Windows. The Windows leg is the standing substitute for
# a manual Windows scroll soak: WebView2 in the shipped app is Chromium, so
# Chromium-on-Windows exercises the engine plus real Windows compositor,
# fonts, and scroll timing (see plans/editor-scroll-ownership-redesign-plan.md).
#
# Fires on:
#   - Push to main
#   - Pull requests marked Ready for Review (drafts are skipped)
#   - Manual dispatch (any branch)

name: Browser Tests

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  browser-tests:
    name: Browser Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run browser tests
        run: npm run test:browser

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results-${{ matrix.os }}
          path: test-results/
          retention-days: 7
          if-no-files-found: ignore
